name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.compiler }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            compiler: gcc-14
            cc: gcc-14
            cxx: g++-14

          - os: ubuntu-24.04
            compiler: clang-18
            cc: clang-18
            cxx: clang++-18

          - os: macos-14
            compiler: appleclang
            cc: clang
            cxx: clang++

    steps:
      - name: Checkout tor_relays
        uses: actions/checkout@v4

      - name: Checkout obfs4_cpp (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: scorpiondefense/obfs4_cpp
          path: obfs4_cpp

      - name: Install dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build \
            libssl-dev libboost-all-dev \
            ${{ matrix.cxx }}

      - name: Install dependencies (macOS)
        if: startsWith(matrix.os, 'macos')
        run: brew install cmake ninja openssl@3 boost

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DBUILD_TESTING=ON \
            ${{ startsWith(matrix.os, 'macos') && '-DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)' || '' }}

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure --parallel

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.compiler }}
          path: build/test-results/
          if-no-files-found: ignore

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout tor_relays
        uses: actions/checkout@v4

      - name: Checkout obfs4_cpp
        uses: actions/checkout@v4
        with:
          repository: scorpiondefense/obfs4_cpp
          path: obfs4_cpp

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-tidy-18 cppcheck \
            libssl-dev libboost-all-dev

      - name: Run cppcheck
        run: |
          cppcheck --enable=all --inconclusive --std=c++23 \
            --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression \
            -I include/ -I obfs4_cpp/include/ \
            src/ 2>&1 | tee cppcheck-report.txt

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: static-analysis-results
          path: cppcheck-report.txt

  sanitizers:
    name: Sanitizer / ${{ matrix.sanitizer }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined, thread]

    steps:
      - name: Checkout tor_relays
        uses: actions/checkout@v4

      - name: Checkout obfs4_cpp
        uses: actions/checkout@v4
        with:
          repository: scorpiondefense/obfs4_cpp
          path: obfs4_cpp

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build clang-18 \
            libssl-dev libboost-all-dev

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang-18 \
            -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_CXX_FLAGS="-fsanitize=${{ matrix.sanitizer }} -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=${{ matrix.sanitizer }}" \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure
        env:
          ASAN_OPTIONS: detect_leaks=1:check_initialization_order=1
          UBSAN_OPTIONS: print_stacktrace=1
          TSAN_OPTIONS: second_deadlock_stack=1

  coverage:
    name: Code Coverage
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout tor_relays
        uses: actions/checkout@v4

      - name: Checkout obfs4_cpp
        uses: actions/checkout@v4
        with:
          repository: scorpiondefense/obfs4_cpp
          path: obfs4_cpp

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build g++-14 lcov \
            libssl-dev libboost-all-dev

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14 \
            -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage" \
            -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
            -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        working-directory: build
        run: ctest --output-on-failure

      - name: Generate coverage report
        run: |
          lcov --capture --directory build --output-file coverage.info
          lcov --remove coverage.info '/usr/*' '*/tests/*' '*/_deps/*' --output-file coverage.info
          lcov --list coverage.info

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build-status:
    name: Build Status
    runs-on: ubuntu-24.04
    needs: [build-and-test, static-analysis, sanitizers, coverage]
    if: always()
    steps:
      - name: Check status
        run: |
          if [[ "${{ needs.build-and-test.result }}" == "success" && \
                "${{ needs.static-analysis.result }}" == "success" && \
                "${{ needs.sanitizers.result }}" == "success" ]]; then
            echo "All CI checks passed"
            exit 0
          else
            echo "Some CI checks failed"
            exit 1
          fi
